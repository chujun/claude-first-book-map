<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球书籍地图 - Top 1000 Books Globe</title>
    <!-- 使用系统字体，无需加载外部字体 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌍 全球书籍地图</h1>
            <p class="subtitle">探索世界文学瑰宝 - Top 1000 经典著作</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索书籍或作者...">
                </div>

                <div class="filter-section">
                    <h3>年代筛选</h3>
                    <select id="decadeFilter">
                        <option value="all">全部年代</option>
                        <option value="1900">1900年代</option>
                        <option value="1910">1910年代</option>
                        <option value="1920">1920年代</option>
                        <option value="1930">1930年代</option>
                        <option value="1940">1940年代</option>
                        <option value="1950">1950年代</option>
                        <option value="1960">1960年代</option>
                        <option value="1970">1970年代</option>
                        <option value="1980">1980年代</option>
                        <option value="1990">1990年代</option>
                        <option value="2000">2000年代</option>
                        <option value="2010">2010年代</option>
                        <option value="2020">2020年代</option>
                    </select>
                </div>

                <div class="filter-section">
                    <h3>地区筛选</h3>
                    <select id="regionFilter">
                        <option value="all">全部地区</option>
                        <option value="Asia">亚洲</option>
                        <option value="Europe">欧洲</option>
                        <option value="Americas">美洲</option>
                        <option value="Africa">非洲</option>
                        <option value="Oceania">大洋洲</option>
                    </select>
                </div>

                <div class="filter-section">
                    <h3>国家筛选</h3>
                    <select id="countryFilter">
                        <option value="all">全部国家</option>
                    </select>
                </div>

                <div class="stats-panel">
                    <div class="stat-item">
                        <span class="stat-number" id="totalBooks">0</span>
                        <span class="stat-label">书籍总数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="totalCountries">0</span>
                        <span class="stat-label">国家/地区</span>
                    </div>
                </div>

                <div class="book-list" id="bookList">
                    <!-- 书籍列表将通过 JS 动态生成 -->
                </div>
            </div>

            <div class="map-section">
                <div id="globe"></div>
                <div class="map-legend">
                    <h3>图例</h3>
                    <div class="legend-items">
                        <div class="legend-item">
                            <span class="legend-color" style="background: #e74c3c;"></span>
                            <span>欧洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #3498db;"></span>
                            <span>美洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #2ecc71;"></span>
                            <span>亚洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #f39c12;"></span>
                            <span>非洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #9b59b6;"></span>
                            <span>大洋洲文学</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 书籍详情模态框 -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody">
                <!-- 详情内容将通过 JS 动态生成 -->
            </div>
        </div>
    </div>

    <!-- Main App -->
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球书籍地图 - Top 100 Books World Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌍 全球书籍地图</h1>
            <p class="subtitle">探索世界文学瑰宝 - Top 100 经典著作</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="map-section">
                <div id="map"></div>
                <div class="map-legend">
                    <h3>图例</h3>
                    <div class="legend-items">
                        <div class="legend-item">
                            <span class="legend-color" style="background: #e74c3c;"></span>
                            <span>欧洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #3498db;"></span>
                            <span>美洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #2ecc71;"></span>
                            <span>亚洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #f39c12;"></span>
                            <span>非洲文学</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color" style="background: #9b59b6;"></span>
                            <span>大洋洲文学</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索书籍或作者...">
                </div>

                <div class="stats-panel">
                    <div class="stat-item">
                        <span class="stat-number" id="totalBooks">0</span>
                        <span class="stat-label">书籍总数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="totalCountries">0</span>
                        <span class="stat-label">国家/地区</span>
                    </div>
                </div>

                <div class="book-list" id="bookList">
                    <!-- 书籍列表将通过 JS 动态生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 书籍详情模态框 -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody">
                <!-- 详情内容将通过 JS 动态生成 -->
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Book Data -->
    <script src="js/book-data.js"></script>

    <!-- Main App -->
    <script src="js/app.js"></script>
</body>
</html>
